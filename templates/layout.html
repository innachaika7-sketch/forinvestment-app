<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1B2A44">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
    <title>{% block title %}Инвестор{% endblock %}</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 15px; background: #f5f5f5; margin: 0; }
        .container { max-width: 500px; margin: 0 auto; }
        .card { background: white; padding: 15px; border-radius: 10px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .nav { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 20px; }
        .nav a { background: #2E7D32; color: white; padding: 8px 12px; text-decoration: none; border-radius: 8px; flex: 1 0 auto; text-align: center; min-width: 60px; font-size: 14px; }
        .nav a.orange { background: #F57C00; }
        .nav a.blue { background: #1976D2; }
        .nav a.purple { background: #6A1B9A; }
        .nav a.grey { background: #757575; }
        .nav a.cyan { background: #00838F; }
        .nav a.contact { background: #1B2A44; }
        .nav a.instruction { background: #795548; }
        .positive { color: green; }
        .negative { color: red; }
        .flash { padding: 10px; border-radius: 5px; margin-bottom: 15px; }
        .flash.success { background: #d4edda; color: #155724; }
        .flash.error { background: #f8d7da; color: #721c24; }
        label { font-weight: bold; display: block; margin-top: 10px; }
        input, select { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 5px; }
        button { background: #2E7D32; color: white; padding: 12px 20px; border: none; border-radius: 8px; font-size: 16px; margin-top: 15px; cursor: pointer; width: 100%; }
        .inline-btn { width: auto; padding: 5px 10px; font-size: 14px; }
        .delete-btn { background: #c62828; }
        .export-btn { background: #1565C0; }
        .file-input { margin-top: 5px; }
        .toggle-header { cursor: pointer; user-select: none; }
        .toggle-content { display: none; }
        .toggle-content.open { display: block; }
        @media (max-width: 500px) {
            .nav a { font-size: 12px; padding: 6px 8px; min-width: 50px; }
        }
        @media (max-width: 400px) {
            .nav a { font-size: 11px; padding: 5px 6px; min-width: 45px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav">
            <a href="{{ url_for('dashboard') }}">📊 Дашборд</a>
            <a href="{{ url_for('calculator_root') }}" class="orange">🧮 Калькулятор</a>
            <a href="{{ url_for('operations_root') }}" class="blue">📋 Операции</a>
            <a href="{{ url_for('projects_root') }}" class="grey">📁 Проекты</a>
            <a href="{{ url_for('contacts') }}" class="contact">📞 Контакты</a>
            <a href="{{ url_for('instructions') }}" class="instruction">📖 Инструкция</a>
        </div>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </div>

    <!-- Регистрация Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(() => console.log('Service Worker зарегистрирован'))
                .catch((err) => console.log('Ошибка регистрации Service Worker:', err));
        }
    </script>
</body>
</html>
